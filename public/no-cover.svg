<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <clipPath id="card">
      <rect width="300" height="400" rx="4"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="300" height="400" fill="#f5f0e8" rx="4"/>

  <!-- 抽象幾何圓圈（參考源站橙黃風格） -->
  <!-- 大橙黃圓 -->
  <circle cx="210" cy="130" r="140" fill="#f5a623" opacity="0.85" clip-path="url(#card)"/>
  <!-- 深橙圓 -->
  <circle cx="260" cy="200" r="110" fill="#e07b20" opacity="0.7" clip-path="url(#card)"/>
  <!-- 紅橙圓 -->
  <circle cx="170" cy="240" r="90" fill="#c94f10" opacity="0.55" clip-path="url(#card)"/>
  <!-- 淺黃圓 -->
  <circle cx="100" cy="100" r="100" fill="#ffd04b" opacity="0.6" clip-path="url(#card)"/>
  <!-- 灰圓（左下） -->
  <circle cx="50" cy="320" r="80" fill="#b0a898" opacity="0.45" clip-path="url(#card)"/>
  <!-- 灰圓（右上） -->
  <circle cx="280" cy="60" r="70" fill="#c8bfb0" opacity="0.4" clip-path="url(#card)"/>
  <!-- 小深橙圓 -->
  <circle cx="140" cy="320" r="65" fill="#d9620a" opacity="0.5" clip-path="url(#card)"/>

  <!-- 底部漸層遮罩，讓文字更清晰 -->
  <defs>
    <linearGradient id="textBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect y="260" width="300" height="140" fill="url(#textBg)" clip-path="url(#card)"/>

  <!-- 文字 -->
  <text x="150" y="338" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="0.5">No Cover</text>
  <text x="150" y="370" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="0.5">Available</text>
</svg>
